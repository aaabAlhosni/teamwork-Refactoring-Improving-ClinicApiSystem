# Application name
spring.application.name=clinic-api

# H2 database saved as files inside the project
spring.datasource.url=jdbc:h2:file:./data/clinicdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create or update database tables automatically
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console
spring.jpa.show-sql=true

# Enable the H2 database web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

